services:
  nginx:
    container_name: nginx_container
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    networks:
      - app-network
    volumes:
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - ./node-app/frontend/html:/usr/share/nginx/html

    restart: unless-stopped

networks:
  app-network:
    external: true